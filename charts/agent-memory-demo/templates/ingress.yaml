{{- if and .Values.ingress.enabled .Values.dns.domain }}
{{- if or (eq .Values.ingress.type "nginx") (eq .Values.ingress.type "haproxy") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
  {{- if eq .Values.ingress.type "haproxy" }}
  annotations:
    kubernetes.io/ingress.class: haproxy
    haproxy.org/auth-type: basic-auth
    haproxy.org/auth-secret: "{{ .Release.Namespace }}/{{ .Values.secrets.password }}"
    haproxy.org/auth-realm: "Authentication Required"
  {{- else }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ .Values.secrets.password }}
    nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required'
  {{- end }}
spec:
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - "{{ .Values.name }}.{{ .Values.dns.domain }}"
      secretName: {{ .Values.tls.secretName }}
  {{- end }}
  rules:
    - host: "{{ .Values.name }}.{{ .Values.dns.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.service }}
                port:
                  number: 7860
{{- end }}
{{- end }}
