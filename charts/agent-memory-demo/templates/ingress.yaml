{{- if and .Values.ingress.enabled .Values.dns.domain }}
{{- if or (eq .Values.ingress.type "nginx") (eq .Values.ingress.type "haproxy") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
  {{- if eq .Values.ingress.type "haproxy" }}
  annotations:
    kubernetes.io/ingress.class: haproxy
  {{- else }}
  annotations:
    kubernetes.io/ingress.class: nginx
  {{- end }}
spec:
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - "{{ .Values.name }}.{{ .Values.dns.domain }}"
      secretName: {{ .Values.tls.secretName }}
  {{- end }}
  rules:
    - host: "{{ .Values.name }}.{{ .Values.dns.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.service }}
                port:
                  number: 3000
{{- end }}
{{- end }}
