apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-memory-demo
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: agent-memory-demo
  template:
    metadata:
      labels:
        app: agent-memory-demo
    spec:
      containers:
        - name: agent-memory-demo-api
          image: "docker.io/mminichino/agent-memory-demo-api:{{ .Values.app.apiVersion }}"
          imagePullPolicy: Always
          env:
            - name: AGENT_MEMORY_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.url }}
                  key: AGENT_MEMORY_SERVER_URL
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tavily }}
                  key: TAVILY_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.openai }}
                  key: OPENAI_API_KEY
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
        - name: agent-memory-demo-web
          image: "docker.io/mminichino/agent-memory-demo-web:{{ .Values.app.webVersion }}"
          imagePullPolicy: Always
          env:
            - name: REDIS_HOST
              value: "{{ .Values.dbName }}.{{ .Release.Namespace }}.svc.cluster.local"
            - name: REDIS_PORT
              value: "{{ .Values.dbPort}}"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redis }}
                  key: password
            - name: CHAT_API_URL
              value: "http://localhost:8088"
            - name: ADMIN_USER
              value: {{ .Values.app.username }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.password }}
                  key: password
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
