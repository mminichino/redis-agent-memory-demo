{{- if and .Values.ingress.enabled .Values.dns.domain }}
{{- if not .Values.externalSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.password }}
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  password: {{ .Values.app.password | b64enc }}
{{- end }}
{{- end }}
