apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-memory-server
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: agent-memory-server
  template:
    metadata:
      labels:
        app: agent-memory-server
    spec:
      containers:
        - name: agent-memory-server
          image: "{{ .Values.registry }}/{{ .Values.repository }}/{{ .Values.image }}:{{ .Values.tag }}"
          imagePullPolicy: Always
          env:
            - name: DISABLE_AUTH
              value: {{ .Values.disableAuth | quote }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.secretName }}
                  key: REDIS_URL
            - name: LONG_TERM_MEMORY
              value: {{ .Values.longTermMemory | quote }}
            - name: ENABLE_TOPIC_EXTRACTION
              value: {{ .Values.topicExtraction | quote }}
            - name: ENABLE_NER
              value: {{ .Values.enableNer | quote }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openai.secretName }}
                  key: OPENAI_API_KEY
            - name: GENERATION_MODEL
              value: {{ .Values.model.generation | quote }}
            - name: FAST_MODEL
              value: {{ .Values.model.fast | quote }}
            - name: SLOW_MODEL
              value: {{ .Values.model.generation | quote }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.model.embedding | quote }}
            - name: PORT
              value: {{ .Values.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
        - name: agent-memory-worker
          image: "{{ .Values.registry }}/{{ .Values.repository }}/{{ .Values.image }}:{{ .Values.tag }}"
          command: [ "agent-memory" ]
          args: [ "task-worker" ]
          imagePullPolicy: Always
          env:
            - name: DISABLE_AUTH
              value: {{ .Values.disableAuth | quote }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.secretName }}
                  key: REDIS_URL
            - name: LONG_TERM_MEMORY
              value: {{ .Values.longTermMemory | quote }}
            - name: ENABLE_TOPIC_EXTRACTION
              value: {{ .Values.topicExtraction | quote }}
            - name: ENABLE_NER
              value: {{ .Values.enableNer | quote }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openai.secretName }}
                  key: OPENAI_API_KEY
            - name: GENERATION_MODEL
              value: {{ .Values.model.generation | quote }}
            - name: FAST_MODEL
              value: {{ .Values.model.fast | quote }}
            - name: SLOW_MODEL
              value: {{ .Values.model.generation | quote }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.model.embedding | quote }}
