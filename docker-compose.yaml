networks:
  agent_memory_network:
    driver: bridge
    name: agent-memory-network

volumes:
  agent_memory_data_ams:
    driver: local
    name: agent-memory-data-ams-volume
  agent_memory_data_web:
    driver: local
    name: agent-memory-data-web-volume

services:
  redis-ams:
    image: redis:8.4
    container_name: agent-memory-redis-ams
    ports:
      - "12002:6379"
    volumes:
      - agent_memory_data_ams:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
    networks:
      - agent_memory_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis-web:
    image: redis:8.4
    container_name: agent-memory-redis-web
    ports:
      - "12003:6379"
    volumes:
      - agent_memory_data_web:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
    networks:
      - agent_memory_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    profiles: ["standard", ""]
    image: redislabs/agent-memory-server:latest
    container_name: agent-memory-server
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: true
    environment:
      - REDIS_URL=redis://redis-ams:6379
      - PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GENERATION_MODEL=gpt-5.2-chat-latest
      - FAST_MODEL=gpt-5-mini
      - SLOW_MODEL=gpt-5.2-chat-latest
      - EMBEDDING_MODEL=text-embedding-3-small
      - LONG_TERM_MEMORY=true
      - ENABLE_TOPIC_EXTRACTION=true
      - ENABLE_NER=true
      - DISABLE_AUTH=true
    depends_on:
      - redis-ams
    networks:
      - agent_memory_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  task-worker:
    profiles: ["standard", ""]
    image: redislabs/agent-memory-server:latest
    container_name: agent-memory-worker
    env_file:
      - path: .env
        required: true
    environment:
      - REDIS_URL=redis://redis-ams:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GENERATION_MODEL=gpt-5.2-chat-latest
      - FAST_MODEL=gpt-5-mini
      - SLOW_MODEL=gpt-5.2-chat-latest
      - EMBEDDING_MODEL=text-embedding-3-small
      - LONG_TERM_MEMORY=true
      - ENABLE_TOPIC_EXTRACTION=true
      - ENABLE_NER=true
      - DISABLE_AUTH=true
    depends_on:
      - redis-ams
      - api
    command: ["agent-memory", "task-worker"]
    restart: unless-stopped
    networks:
      - agent_memory_network

  grpc-server:
    build:
      context: .
      dockerfile: Dockerfile.grpc
    image: agent-memory-demo-api:latest
    container_name: agent-memory-demo-api
    environment:
      - AGENT_MEMORY_SERVER_URL=http://api:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    depends_on:
      - redis-ams
      - api
      - task-worker
    ports:
      - "8088:8088"
    restart: unless-stopped
    networks:
      - agent_memory_network

  web-server:
    build:
      context: web
      dockerfile: Dockerfile
    image: agent-memory-demo-web:latest
    container_name: agent-memory-demo-web
    environment:
      - REDIS_HOST=redis-web
      - REDIS_PORT=6379
      - CHAT_API_URL=http://grpc-server:8088
    depends_on:
      - redis-web
      - grpc-server
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - agent_memory_network
