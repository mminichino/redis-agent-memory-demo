networks:
  agent_memory_network:
    driver: bridge
    name: agent-memory-network

volumes:
  agent_memory_data:
    driver: local
    name: agent-memory-data-volume

services:
  redis:
    image: redis:8.4
    container_name: agent-memory-redis
    ports:
      - "12002:6379"
    volumes:
      - agent_memory_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
    networks:
      - agent_memory_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    profiles: ["standard", ""]
    image: redislabs/agent-memory-server:latest
    container_name: agent-memory-server
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: true
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GENERATION_MODEL=gpt-5.2-chat-latest
      - FAST_MODEL=gpt-5-mini
      - SLOW_MODEL=gpt-5.2-chat-latest
      - EMBEDDING_MODEL=text-embedding-3-small
      - LONG_TERM_MEMORY=true
      - ENABLE_TOPIC_EXTRACTION=true
      - ENABLE_NER=true
      - DISABLE_AUTH=true
    depends_on:
      - redis
    networks:
      - agent_memory_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  task-worker:
    profiles: ["standard", ""]
    image: redislabs/agent-memory-server:latest
    container_name: agent-memory-worker
    env_file:
      - path: .env
        required: true
    environment:
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GENERATION_MODEL=gpt-5.2-chat-latest
      - FAST_MODEL=gpt-5-mini
      - SLOW_MODEL=gpt-5.2-chat-latest
      - EMBEDDING_MODEL=text-embedding-3-small
      - LONG_TERM_MEMORY=true
      - ENABLE_TOPIC_EXTRACTION=true
      - ENABLE_NER=true
      - DISABLE_AUTH=true
    depends_on:
      - redis
      - api
    command: ["agent-memory", "task-worker"]
    restart: unless-stopped
    networks:
      - agent_memory_network

  demo:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-memory-demo:latest
    container_name: agent-memory-demo
    environment:
      - AGENT_MEMORY_SERVER_URL=http://api:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    depends_on:
      - redis
      - api
    ports:
      - "8080:7860"
    restart: unless-stopped
    networks:
      - agent_memory_network
